version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ramo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ramo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ramo_password}
      POSTGRES_DB: ${POSTGRES_DB:-ramo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ramo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ramo} -d ${POSTGRES_DB:-ramo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ramo:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: ramo-site
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ramo}:${POSTGRES_PASSWORD:-ramo_password}@postgres:5432/${POSTGRES_DB:-ramo}?schema=public
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ramo-uploads:/app/public/images/uploads
    networks:
      - ramo-network

  nginx:
    image: nginx:alpine
    container_name: ramo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - ramo
    networks:
      - ramo-network

volumes:
  postgres-data:
  ramo-uploads:

networks:
  ramo-network:
    driver: bridge
